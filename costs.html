<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost Breakdown — Token Auditor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --accent: #e85d26;
    --accent-soft: #fff0eb;
    --teal: #0d9488;
    --teal-soft: #ecfdf5;
    --rose: #e11d48;
    --rose-soft: #fff1f2;
    --amber: #d97706;
    --amber-soft: #fffbeb;
    --indigo: #6366f1;
    --indigo-soft: #eef2ff;
    --purple: #8b5cf6;
    --purple-soft: #f5f3ff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
  }

  html[data-theme="dark"] {
    --bg: #0b0b0f;
    --surface: #14141a;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.12);
    --text: #f0f0f2;
    --text-secondary: #a0a0a8;
    --text-tertiary: #666670;
    --accent-soft: rgba(232,93,38,0.12);
    --teal-soft: rgba(13,148,136,0.15);
    --rose-soft: rgba(225,29,72,0.12);
    --amber-soft: rgba(217,119,6,0.15);
    --indigo-soft: rgba(99,102,241,0.15);
    --purple-soft: rgba(139,92,246,0.15);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 24px;
    padding: 12px 0;
  }
  .logo {
    max-width: 440px;
    width: 100%;
    height: auto;
    border-radius: 16px;
    transition: opacity 0.3s var(--ease);
  }
  .logo-light { display: block; }
  .logo-dark { display: none; }
  html[data-theme="dark"] .logo-light { display: none; }
  html[data-theme="dark"] .logo-dark { display: block; }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: transform 0.3s var(--ease), background 0.3s var(--ease);
    font-family: inherit;
  }
  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle:active { transform: scale(0.95); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100dvh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-size: 16px;
    color: var(--text-tertiary);
    font-weight: 400;
    margin-top: 8px;
  }
  .nav {
    display: flex;
    gap: 12px;
  }
  .nav a {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s var(--ease);
  }
  .nav a:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .nav a.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Section titles */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
    padding-left: 2px;
  }

  /* Hero stat row */
  .hero-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 48px;
  }
  @media (max-width: 1000px) { .hero-row { grid-template-columns: 1fr; } }

  .hero-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 32px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .hero-card.primary {
    background: linear-gradient(135deg, var(--surface) 0%, var(--accent-soft) 100%);
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -10%;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.05;
    pointer-events: none;
  }
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 12px;
    position: relative;
  }
  .hero-value {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    position: relative;
  }
  .hero-card:not(.primary) .hero-value { font-size: 40px; color: var(--text); }
  .hero-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 10px;
    position: relative;
  }
  .hero-breakdown {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    position: relative;
  }
  .hero-breakdown-item { text-align: left; }
  .hero-breakdown-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-tertiary);
  }
  .hero-breakdown-value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* Chart cards */
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 48px;
  }
  @media (max-width: 1000px) { .chart-row { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-sm);
  }
  .chart-card h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
  }
  .chart-card canvas { max-height: 300px; }

  /* Category cards with progress */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s var(--ease);
  }
  .cat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .cat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .cat-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .cat-count {
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .cat-total {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    margin-bottom: 12px;
  }
  .cat-progress {
    height: 6px;
    background: rgba(0,0,0,0.04);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .cat-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s var(--ease);
  }
  .cat-pct {
    font-size: 11px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }
  .cat-vendors {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Vendor table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .table-card h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 14px;
    color: var(--text-tertiary);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border-strong);
  }
  th.num { text-align: right; }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: rgba(0,0,0,0.015); }
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .vendor-bar {
    display: inline-block;
    height: 6px;
    background: linear-gradient(90deg, var(--accent), var(--amber));
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* Category tags */
  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .tag-ai-api { background: var(--accent-soft); color: var(--accent); }
  .tag-ai-tool { background: var(--indigo-soft); color: var(--indigo); }
  .tag-dev-infra { background: var(--teal-soft); color: var(--teal); }
  .tag-dev-tools { background: var(--amber-soft); color: var(--amber); }
  .tag-data { background: var(--purple-soft); color: var(--purple); }
  .tag-other { background: rgba(0,0,0,0.04); color: var(--text-tertiary); }

  /* Filter bar */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    font-family: inherit;
  }
  .filter-btn:hover { background: var(--accent-soft); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .empty {
    text-align: center;
    padding: 48px;
    color: var(--text-tertiary);
    font-size: 14px;
  }
  .empty code {
    background: rgba(0,0,0,0.04);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  /* Export button */
  .export-row {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 16px;
  }
  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 24px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    font-family: inherit;
    text-decoration: none;
  }
  .export-btn:hover { transform: scale(1.04); }
  .export-btn.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <img src="token-logo-light.png" alt="Token Tracker" class="logo logo-light">
    <img src="token-logo-dark.png" alt="Token Tracker" class="logo logo-dark">
  </div>
  <div class="header">
    <div>
      <h1>Cost Breakdown</h1>
      <div class="header-sub" id="sub">Loading receipts…</div>
    </div>
    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="costs.html" class="active">Costs</a>
    </nav>
  </div>

  <div id="main"></div>
</div>

<script>
const CAT_COLORS = {
  'ai-api': '#e85d26',
  'ai-tool': '#6366f1',
  'dev-infra': '#0d9488',
  'dev-tools': '#d97706',
  'data': '#8b5cf6',
  'other': '#9a9a9a',
};
const CAT_ICONS = {
  'ai-api': '&#129504;',
  'ai-tool': '&#128187;',
  'dev-infra': '&#9729;',
  'dev-tools': '&#128295;',
  'data': '&#128202;',
  'other': '&#128230;',
};
const CAT_LABELS = {
  'ai-api': 'AI APIs',
  'ai-tool': 'AI Tools',
  'dev-infra': 'Dev Infrastructure',
  'dev-tools': 'Dev Tools',
  'data': 'Data & APIs',
  'other': 'Other',
};

Chart.defaults.font.family = "'Geist', -apple-system, sans-serif";
Chart.defaults.font.weight = 500;

async function load() {
  let receipts = [];
  try {
    const r = await fetch('receipts.jsonl?t=' + Date.now());
    if (r.ok) {
      const text = await r.text();
      receipts = text.trim().split('\n').filter(l => l)
        .map(l => { try { return JSON.parse(l); } catch { return null; } })
        .filter(Boolean);
    }
  } catch {}

  const main = document.getElementById('main');

  if (receipts.length === 0) {
    document.getElementById('sub').textContent = 'No receipts yet';
    main.innerHTML = `
      <div class="table-card">
        <div class="empty">
          No receipts found.<br><br>
          Run the Gmail extractor to populate this view, or<br>
          manually add receipts via <code>python3 receipts.py</code>.
        </div>
      </div>
    `;
    return;
  }

  // Summarize
  let total = 0;
  const byCat = {};
  const byVendor = {};
  const byMonth = {};
  const vendorCat = {};
  receipts.forEach(r => {
    const amt = parseFloat(r.amount) || 0;
    total += amt;
    const cat = r.category || 'other';
    byCat[cat] = byCat[cat] || { total: 0, count: 0, vendors: new Set() };
    byCat[cat].total += amt;
    byCat[cat].count += 1;
    byCat[cat].vendors.add(r.vendor || 'unknown');

    const vend = r.vendor || 'unknown';
    byVendor[vend] = byVendor[vend] || { total: 0, count: 0, category: cat };
    byVendor[vend].total += amt;
    byVendor[vend].count += 1;
    vendorCat[vend] = cat;

    const month = (r.date || '').slice(0, 7) || 'unknown';
    byMonth[month] = (byMonth[month] || 0) + amt;
  });

  const dates = receipts.map(r => r.date).filter(Boolean).sort();
  const firstDate = dates[0] || '';
  const lastDate = dates[dates.length - 1] || '';
  const daySpan = firstDate && lastDate
    ? Math.max(1, Math.round((new Date(lastDate) - new Date(firstDate)) / 86400000)) : 1;
  const monthlyAvg = (total / Math.max(1, daySpan / 30)).toFixed(2);
  const avgReceipt = (total / receipts.length).toFixed(2);

  document.getElementById('sub').textContent =
    `${receipts.length} receipts across ${Object.keys(byVendor).length} vendors · ${firstDate} → ${lastDate}`;

  // Hero cards
  let heroHtml = `
    <div class="hero-row">
      <div class="hero-card primary">
        <div class="hero-label">Total Spend</div>
        <div class="hero-value">$${total.toFixed(2)}</div>
        <div class="hero-sub">${firstDate} through ${lastDate}</div>
        <div class="hero-breakdown">
          <div class="hero-breakdown-item">
            <div class="hero-breakdown-label">Monthly Avg</div>
            <div class="hero-breakdown-value">$${monthlyAvg}</div>
          </div>
          <div class="hero-breakdown-item">
            <div class="hero-breakdown-label">Avg Receipt</div>
            <div class="hero-breakdown-value">$${avgReceipt}</div>
          </div>
          <div class="hero-breakdown-item">
            <div class="hero-breakdown-label">Receipts</div>
            <div class="hero-breakdown-value">${receipts.length}</div>
          </div>
        </div>
      </div>
      <div class="hero-card">
        <div class="hero-label">Biggest Category</div>
        <div class="hero-value" id="top-cat-value">$0</div>
        <div class="hero-sub" id="top-cat-label">—</div>
      </div>
      <div class="hero-card">
        <div class="hero-label">Top Vendor</div>
        <div class="hero-value" id="top-vendor-value">$0</div>
        <div class="hero-sub" id="top-vendor-label">—</div>
      </div>
    </div>
  `;

  // By category cards
  const sortedCats = Object.entries(byCat).sort((a, b) => b[1].total - a[1].total);
  const topCat = sortedCats[0];
  const topVendor = Object.entries(byVendor).sort((a, b) => b[1].total - a[1].total)[0];

  let catHtml = `<div class="section-title">By Category</div><div class="category-grid">`;
  sortedCats.forEach(([cat, d]) => {
    const pct = total > 0 ? (d.total / total * 100).toFixed(1) : 0;
    const vendors = Array.from(d.vendors).slice(0, 5).join(', ');
    const extra = d.vendors.size > 5 ? ` +${d.vendors.size - 5} more` : '';
    catHtml += `
      <div class="cat-card">
        <div class="cat-header">
          <div class="cat-icon" style="background:${CAT_COLORS[cat]}20;color:${CAT_COLORS[cat]}">${CAT_ICONS[cat] || '&#128230;'}</div>
          <div>
            <div class="cat-name">${CAT_LABELS[cat] || cat}</div>
            <div class="cat-count">${d.count} receipts · ${d.vendors.size} vendor${d.vendors.size !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="cat-total">$${d.total.toFixed(2)}</div>
        <div class="cat-progress">
          <div class="cat-progress-fill" style="width:${pct}%;background:${CAT_COLORS[cat]}"></div>
        </div>
        <div class="cat-pct">${pct}% of total</div>
        <div class="cat-vendors">${vendors}${extra}</div>
      </div>
    `;
  });
  catHtml += `</div>`;

  // Charts section
  const chartsHtml = `
    <div class="chart-row">
      <div class="chart-card">
        <h3>Spend by Month</h3>
        <canvas id="month-chart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Category Distribution</h3>
        <canvas id="cat-chart"></canvas>
      </div>
    </div>
  `;

  // Vendor table
  const sortedVendors = Object.entries(byVendor).sort((a, b) => b[1].total - a[1].total);
  const maxVendor = sortedVendors[0]?.[1].total || 1;
  let vendorTable = `
    <div class="table-card">
      <h3>All Vendors</h3>
      <table>
        <thead><tr><th>Vendor</th><th>Category</th><th class="num">Receipts</th><th class="num">Total</th><th class="num">% of All</th></tr></thead>
        <tbody>
  `;
  sortedVendors.forEach(([vend, d]) => {
    const pct = total > 0 ? (d.total / total * 100).toFixed(1) : 0;
    const barW = Math.round(d.total / maxVendor * 80);
    vendorTable += `
      <tr>
        <td><strong>${vend}</strong></td>
        <td><span class="tag tag-${d.category}">${CAT_LABELS[d.category] || d.category}</span></td>
        <td class="num">${d.count}</td>
        <td class="num"><span class="vendor-bar" style="width:${barW}px"></span><strong>$${d.total.toFixed(2)}</strong></td>
        <td class="num">${pct}%</td>
      </tr>
    `;
  });
  vendorTable += `</tbody></table></div>`;

  // All receipts with filters
  const cats = Array.from(new Set(receipts.map(r => r.category || 'other')));
  let filterHtml = `<div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>`;
  cats.forEach(c => {
    filterHtml += `<button class="filter-btn" data-filter="${c}">${CAT_LABELS[c] || c}</button>`;
  });
  filterHtml += `</div>`;

  const allReceipts = receipts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  let receiptsTable = `
    <div class="section-title">All Receipts</div>
    <div class="export-row">
      <a class="export-btn secondary" href="receipts.jsonl" download>⬇ receipts.jsonl</a>
      <a class="export-btn" href="reports/tax-report-${new Date().getFullYear()}-ytd.md" target="_blank">📄 Tax Report</a>
    </div>
    <div class="table-card">
      ${filterHtml}
      <table id="receipts-table">
        <thead><tr><th>Date</th><th>Vendor</th><th>Category</th><th class="num">Amount</th><th>Description</th></tr></thead>
        <tbody>
  `;
  allReceipts.forEach(r => {
    const cat = r.category || 'other';
    const desc = (r.description || r.email_subject || '').substring(0, 80);
    receiptsTable += `
      <tr data-cat="${cat}">
        <td class="mono">${r.date || '?'}</td>
        <td><strong>${r.vendor || '?'}</strong></td>
        <td><span class="tag tag-${cat}">${CAT_LABELS[cat] || cat}</span></td>
        <td class="num"><strong>$${(parseFloat(r.amount) || 0).toFixed(2)}</strong></td>
        <td style="color:var(--text-secondary);font-size:12px">${desc}</td>
      </tr>
    `;
  });
  receiptsTable += `</tbody></table></div>`;

  main.innerHTML = heroHtml + catHtml + chartsHtml + vendorTable + receiptsTable;

  // Populate hero top-cat and top-vendor
  if (topCat) {
    document.getElementById('top-cat-value').textContent = '$' + topCat[1].total.toFixed(2);
    document.getElementById('top-cat-label').textContent =
      `${CAT_LABELS[topCat[0]] || topCat[0]} · ${(topCat[1].total / total * 100).toFixed(1)}% of spend`;
  }
  if (topVendor) {
    document.getElementById('top-vendor-value').textContent = '$' + topVendor[1].total.toFixed(2);
    document.getElementById('top-vendor-label').textContent =
      `${topVendor[0]} · ${topVendor[1].count} receipt${topVendor[1].count !== 1 ? 's' : ''}`;
  }

  // Render charts
  const sortedMonths = Object.entries(byMonth).sort();
  new Chart(document.getElementById('month-chart'), {
    type: 'bar',
    data: {
      labels: sortedMonths.map(([m]) => m),
      datasets: [{
        data: sortedMonths.map(([, v]) => v),
        backgroundColor: '#e85d2633',
        borderColor: '#e85d26',
        borderWidth: 1.5,
        borderRadius: 6,
      }],
    },
    options: {
      responsive: true,
      animation: { duration: 1200 },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1a', cornerRadius: 8 } },
      scales: {
        y: { ticks: { color: '#9a9a9a', callback: v => '$' + v }, grid: { color: 'rgba(0,0,0,0.04)' }, border: { display: false } },
        x: { ticks: { color: '#9a9a9a' }, grid: { display: false }, border: { display: false } },
      },
    },
  });

  new Chart(document.getElementById('cat-chart'), {
    type: 'doughnut',
    data: {
      labels: sortedCats.map(([c]) => CAT_LABELS[c] || c),
      datasets: [{
        data: sortedCats.map(([, d]) => d.total),
        backgroundColor: sortedCats.map(([c]) => CAT_COLORS[c]),
        borderWidth: 0,
        borderRadius: 4,
        spacing: 3,
      }],
    },
    options: {
      responsive: true,
      cutout: '65%',
      animation: { animateRotate: true, duration: 1400 },
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#6b6b6b', padding: 14, font: { size: 12, weight: 500 }, usePointStyle: true, pointStyle: 'circle' },
        },
      },
    },
  });

  // Wire filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('#receipts-table tbody tr').forEach(tr => {
        tr.style.display = filter === 'all' || tr.dataset.cat === filter ? '' : 'none';
      });
    });
  });
}

load();
setInterval(load, 60000);
</script>
<button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
<script>
(function() {
  const root = document.documentElement;
  const saved = localStorage.getItem('tokentracker-theme') || 'light';
  root.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-toggle');
  const setIcon = () => { btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'; };
  setIcon();
  btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('tokentracker-theme', next);
    setIcon();
  });
})();
</script>
</body>
</html>
